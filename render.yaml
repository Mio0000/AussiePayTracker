services:
  - type: web
    name: aussie-pay-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    nativeEnvironments:
      - name: tesseract-ocr
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
