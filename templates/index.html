<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AussiePayTracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: #1a365d;
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .flag { font-size: 1.6rem; }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; }
    header p  { font-size: 0.8rem; opacity: 0.7; margin-top: 2px; }

    main { max-width: 860px; margin: 40px auto; padding: 0 20px 60px; }

    /* ── Upload card ─────────────────────────────────────────── */
    .upload-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 40px;
      text-align: center;
    }

    .drop-zone {
      border: 2px dashed #90cdf4;
      border-radius: 10px;
      padding: 48px 24px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      background: #ebf8ff;
    }
    .drop-zone:hover, .drop-zone.dragover {
      background: #bee3f8;
      border-color: #3182ce;
    }
    .drop-zone .icon { font-size: 3rem; margin-bottom: 12px; }
    .drop-zone p { color: #4a5568; font-size: 0.95rem; }
    .drop-zone p span { color: #3182ce; font-weight: 600; }
    .drop-zone .hint { font-size: 0.8rem; color: #a0aec0; margin-top: 6px; }

    #fileInput { display: none; }

    .selected-name {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #2d3748;
      font-weight: 500;
    }

    .btn-analyze {
      margin-top: 20px;
      background: #2b6cb0;
      color: white;
      border: none;
      padding: 12px 36px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: none;
    }
    .btn-analyze:hover  { background: #2c5282; }
    .btn-analyze:active { transform: scale(0.98); }
    .btn-analyze:disabled { background: #a0aec0; cursor: not-allowed; }

    /* ── Loading ─────────────────────────────────────────────── */
    .loading {
      display: none;
      margin-top: 20px;
      color: #4a5568;
      font-size: 0.95rem;
    }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid #bee3f8;
      border-top-color: #3182ce;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ───────────────────────────────────────────────── */
    .error-box {
      display: none;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 20px;
      color: #c53030;
      font-size: 0.9rem;
    }

    /* ── Result ──────────────────────────────────────────────── */
    #result { display: none; margin-top: 32px; }

    .result-header {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px 28px;
      margin-bottom: 20px;
    }
    .result-header .employer { font-size: 1.1rem; font-weight: 700; color: #1a365d; }
    .result-header .meta {
      display: flex; flex-wrap: wrap; gap: 20px;
      margin-top: 10px;
    }
    .meta-item label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: #718096; }
    .meta-item span  { display: block; font-size: 0.95rem; font-weight: 600; color: #2d3748; }

    /* ── Shift table ─────────────────────────────────────────── */
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px 28px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #718096;
      margin-bottom: 16px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    th {
      text-align: left;
      padding: 8px 12px;
      background: #f7fafc;
      border-bottom: 2px solid #e2e8f0;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #718096;
    }
    th.num, td.num { text-align: right; }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #edf2f7;
      color: #2d3748;
    }
    tr:last-child td { border-bottom: none; }
    tr.penalty td { background: #fffaf0; color: #c05621; }
    tr.total td {
      font-weight: 700;
      background: #f7fafc;
      border-top: 2px solid #e2e8f0;
    }

    /* ── Summary grid ────────────────────────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 540px) { .summary-grid { grid-template-columns: 1fr; } }

    .summary-item {
      border-radius: 10px;
      padding: 18px 20px;
      background: #f7fafc;
    }
    .summary-item label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #718096;
    }
    .summary-item .this-pay {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 4px;
    }
    .summary-item .ytd {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 2px;
    }

    .gross  .this-pay { color: #276749; }
    .tax    .this-pay { color: #c53030; }
    .super  .this-pay { color: #2b6cb0; }
    .net    { background: #ebf8ff; border: 1px solid #90cdf4; }
    .net    .this-pay { color: #1a365d; font-size: 1.8rem; }

    .leave-badge {
      display: inline-block;
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      color: #276749;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <span class="flag">🇦🇺</span>
  <div>
    <h1>AussiePayTracker</h1>
    <p>Australian Payslip Analyser</p>
  </div>
</header>

<main>
  <div class="upload-card">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📄</div>
      <p>Drop your payslip here, or <span>click to browse</span></p>
      <p class="hint">PDF · PNG · JPG · WEBP · TIFF &nbsp;·&nbsp; Silk / Dayforce / MYOB / Xero and more</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.webp,.tiff,.tif,.bmp">

    <div class="selected-name" id="selectedName"></div>
    <button class="btn-analyze" id="btnAnalyze">Analyse</button>
    <div class="loading" id="loading"><span class="spinner"></span>Analysing...</div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div id="result">
    <div class="result-header">
      <div class="employer" id="rEmployer"></div>
      <div class="meta">
        <div class="meta-item">
          <label>Employee</label>
          <span id="rEmployee"></span>
        </div>
        <div class="meta-item">
          <label>Pay Period</label>
          <span id="rPeriod"></span>
        </div>
        <div class="meta-item">
          <label>Pay Date</label>
          <span id="rPayDate"></span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Shift Breakdown</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th class="num">Hours</th>
            <th class="num">Rate</th>
            <th class="num">Amount</th>
          </tr>
        </thead>
        <tbody id="shiftBody"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Pay Summary</h2>
      <div class="summary-grid">
        <div class="summary-item gross">
          <label>Gross Pay</label>
          <div class="this-pay" id="sGross"></div>
          <div class="ytd" id="sGrossYtd"></div>
        </div>
        <div class="summary-item tax">
          <label>Tax Withheld</label>
          <div class="this-pay" id="sTax"></div>
          <div class="ytd" id="sTaxYtd"></div>
        </div>
        <div class="summary-item super">
          <label>Superannuation</label>
          <div class="this-pay" id="sSuper"></div>
          <div class="ytd" id="sSuperYtd"></div>
        </div>
        <div class="summary-item net">
          <label>Net Pay</label>
          <div class="this-pay" id="sNet"></div>
          <div class="ytd" id="sNetYtd"></div>
        </div>
      </div>
      <div style="margin-top:16px" id="leaveRow"></div>
    </div>
  </div>
</main>

<script>
  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const btnAnalyze = document.getElementById('btnAnalyze');
  const loading    = document.getElementById('loading');
  const errorBox   = document.getElementById('errorBox');
  const result     = document.getElementById('result');
  const selName    = document.getElementById('selectedName');

  let selectedFile = null;

  // クリックで選択
  dropZone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  // ドラッグ&ドロップ
  dropZone.addEventListener('dragover', e => {
    e.preventDefault(); dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  const ALLOWED = ['.pdf','.png','.jpg','.jpeg','.webp','.tiff','.tif','.bmp'];

  function setFile(f) {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    if (!ALLOWED.includes(ext)) {
      errorBox.textContent = '⚠ Unsupported file type: ' + ext;
      errorBox.style.display = 'block';
      return;
    }
    selectedFile = f;
    selName.textContent = '📎 ' + f.name;
    btnAnalyze.style.display = 'inline-block';
    result.style.display = 'none';
    errorBox.style.display = 'none';
  }

  btnAnalyze.addEventListener('click', async () => {
    if (!selectedFile) return;

    btnAnalyze.disabled = true;
    loading.style.display = 'block';
    errorBox.style.display = 'none';
    result.style.display = 'none';

    const fd = new FormData();
    fd.append('file', selectedFile);

    try {
      const res  = await fetch('/analyze', { method: 'POST', body: fd });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Analysis failed');
      renderResult(data);
    } catch (e) {
      errorBox.textContent = '⚠ ' + e.message;
      errorBox.style.display = 'block';
    } finally {
      btnAnalyze.disabled = false;
      loading.style.display = 'none';
    }
  });

  // ロケール非依存の金額フォーマット
  function fmt(v, neg = false) {
    if (v == null) return '—';
    const str = Math.abs(Number(v)).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return (neg ? '-$' : '$') + str;
  }

  function set(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  }

  function renderResult(d) {
    // ヘッダー
    set('rEmployer', d.employer || '—');
    set('rEmployee', (d.employee_name || '—') + '  (' + (d.employee_id || '—') + ')');
    set('rPeriod',   (d.pay_period_start || '—') + ' – ' + (d.pay_period_end || '—'));
    set('rPayDate',  d.pay_date || '—');

    // シフト
    const tbody = document.getElementById('shiftBody');
    tbody.innerHTML = '';
    let totalHours = 0, totalAmount = 0;
    for (const s of d.shifts) {
      const tr = document.createElement('tr');
      if (s.type === 'penalty') tr.className = 'penalty';
      tr.innerHTML = `
        <td>${s.date}</td>
        <td>${s.label}</td>
        <td class="num">${Number(s.hours).toFixed(2)} h</td>
        <td class="num">$${Number(s.rate).toFixed(4)}</td>
        <td class="num">$${Number(s.amount).toFixed(2)}</td>`;
      tbody.appendChild(tr);
      totalHours  += Number(s.hours);
      totalAmount += Number(s.amount);
    }
    const tfoot = document.createElement('tr');
    tfoot.className = 'total';
    tfoot.innerHTML = `
      <td colspan="2">Total</td>
      <td class="num">${totalHours.toFixed(2)} h</td>
      <td></td>
      <td class="num">$${totalAmount.toFixed(2)}</td>`;
    tbody.appendChild(tfoot);

    // サマリー
    set('sGross',    fmt(d.gross_pay));
    set('sGrossYtd', d.gross_pay_ytd != null ? 'YTD ' + fmt(d.gross_pay_ytd) : '');
    set('sTax',      fmt(d.tax_withheld, true));
    set('sTaxYtd',   d.tax_ytd != null ? 'YTD -' + fmt(d.tax_ytd) : '');
    set('sSuper',    fmt(d.superannuation));
    set('sSuperYtd', d.super_ytd != null ? 'YTD ' + fmt(d.super_ytd) : '');
    set('sNet',      fmt(d.net_pay));
    set('sNetYtd',   d.net_pay_ytd != null ? 'YTD ' + fmt(d.net_pay_ytd) : '');

    const leaveRow = document.getElementById('leaveRow');
    if (d.annual_leave_hours != null) {
      leaveRow.innerHTML =
        `<span style="font-size:.85rem;color:#718096">Annual Leave Balance&nbsp;</span>
         <span class="leave-badge">🌴 ${Number(d.annual_leave_hours).toFixed(2)} h</span>`;
    } else {
      leaveRow.innerHTML = '';
    }

    result.style.display = 'block';
    result.scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
